environments {
  default {
    webdriver.base.url = "http://localhost:5173"
    api.base.url = "http://localhost:8080"
  }
  staging {
    webdriver.base.url = "http://staging.edtech.local:5173"
    api.base.url = "http://staging.edtech.local:8080"
  }
}

serenity {
  take.screenshots = FOR_EACH_ACTION
  restart.browser.for.each = scenario
  encoding = "UTF-8"
  report.encoding = "UTF-8"
  compress.filenames = true
  project.name = "EdTech E2E - SerenityBDD"
}

headless.mode = false

webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicitlywait = 5000
    fluentwait = 10000
  }
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors",
        "--window-size=1920,1080", "incognito", "disable-infobars", "disable-gpu",
        "disable-default-apps", "disable-popup-blocking", "disable-dev-shm-usage",
        "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
    }
  }
}